# -----------------------------------------------------------------------------
# Theme configuration
# -----------------------------------------------------------------------------
[project.theme]
language = "en"
favicon = "assets/favicon.ico"
logo = "assets/app-icon-transparent.svg"
custom_dir = "overrides"

features = [
    "navigation.tabs",
    "navigation.path",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.top",
    "content.code.copy",
    "content.tabs.link",
    "search.highlight",
    "announce.dismiss",
]

[[project.theme.palette]]
scheme = "default"

# -----------------------------------------------------------------------------
# Validation
# -----------------------------------------------------------------------------
# Suppress false-positive "page does not exist" warnings on Windows — zensical
# validates links in a single pass using filesystem (alphabetical) order, so
# capabilities/ pages are checked before their targets are registered.
[project.validation]
invalid_links = false

# -----------------------------------------------------------------------------
# mkdocstrings plugin configuration
# -----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]

backlinks = "tree"
docstring_options = {}
docstring_section_style = "spacy"
heading_level = 1
line_length = 88
inherited_members = true
merge_init_into_class = true
parameter_headings = false
separate_signature = true
show_root_heading = true
show_root_full_path = false
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_bases = false
show_inheritance_diagram = false
signature_crossrefs = true
summary = true
unwrap_annotated = true

filters = [
    "!^_",
    "!^winfo_",
    "!^(pack|grid|place)(_|$)",
    "!^(bind|unbind)(_|$)",
    "!^bindtags",
    "!^after(_|$)",
    "!^focus_",
    "!^tk_focus",
    "!^grab_",
    "!^clipboard_",
    "!^selection_(clear|get|handle|own|own_set)$",
    "!^event_generate$",
    "!^register_localized_field$",
    "!^(rebuild_style|configure_style_options)$",
]


# -----------------------------------------------------------------------------
# Markdown extensions
# -----------------------------------------------------------------------------
[project.markdown_extensions.toc]
toc_depth = 3

[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.admonition]