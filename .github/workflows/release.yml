name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract release title + notes for this tag from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Emits `title=<version> — <heading suffix>` to $GITHUB_OUTPUT and the
          # section body (WITHOUT its "## [version]" heading) to RELEASE_NOTES.md.
          # Dropping the heading keeps the release title from being repeated in
          # the body and removes the "[version]" self-link — so no bottom
          # link-definition needs appending anymore.
          python3 .github/scripts/release_notes.py "$version" RELEASE_NOTES.md "$GITHUB_OUTPUT"
          if [ -s RELEASE_NOTES.md ]; then
            echo "Using curated CHANGELOG notes for $version ($(wc -l < RELEASE_NOTES.md) lines)."
          else
            echo "No CHANGELOG section for $version; using auto-generated notes only."
          fi

      # The release title comes from the CHANGELOG heading ("0.1.3 — ...") and
      # the curated section (minus its heading) becomes the body; GitHub's
      # auto-generated "What's Changed" + Full Changelog link are appended below
      # it (and stand alone for an alpha tag with no CHANGELOG section).
      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.notes.outputs.title }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          files: dist/*
