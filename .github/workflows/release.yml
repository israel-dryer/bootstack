name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract release notes for this tag from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1 }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            # The awk slice stops at the next "## [" heading, so for any section
            # except the oldest it excludes the reference-link definitions at the
            # file bottom — leaving the "## [ver]" heading's "[ver]" rendering as
            # literal brackets in the release body. Append this version's link
            # definition so the heading resolves to a link (matching the file).
            grep -F "[$version]: " CHANGELOG.md >> RELEASE_NOTES.md || true
            echo "Using curated CHANGELOG notes for $version ($(wc -l < RELEASE_NOTES.md) lines)."
          else
            echo "No CHANGELOG section for $version; using auto-generated notes only."
          fi

      # The curated CHANGELOG section becomes the release body; GitHub's
      # auto-generated "What's Changed" + Full Changelog link are appended below
      # it (and stand alone for an alpha tag with no CHANGELOG section).
      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          files: dist/*
